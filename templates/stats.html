<!DOCTYPE html><html><head><title>Analyse Stats</title>
<style>body{font-family:Arial;max-width:800px;margin:30px auto;padding:20px}.card{border:1px solid #ddd;padding:20px;margin:15px 0;border-radius:8px}h1{color:#8b5cf6}table{width:100%;border-collapse:collapse;margin-top:10px}th,td{border:1px solid #ddd;padding:8px}th{background:#f3f4f6}</style>
</head><body>
<h1>📊 Analyse Descriptive des Réponses</h1>
<div class="card"><h2>Total répondants : {{ total }}</h2></div>
<div class="card"><h3>Budget mensuel</h3>
<p>Moyenne : {{ moyenne }} FCFA | Min : {{ mini }} FCFA | Max : {{ maxi }} FCFA</p></div>
<div class="card"><h3>Répartition des dépenses</h3>
<table><tr><th>Dépense</th><th>Nombre</th><th>%</th></tr>
{% for dep, nb, pct in depenses %}
<tr><td>{{ dep }}</td><td>{{ nb }}</td><td>{{ pct }}%</td></tr>
{% endfor %}</table></div>
<a href="/">← Nouveau sondage</a></body></html>
